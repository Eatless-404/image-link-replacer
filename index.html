<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>图片链接位点替换工具</title>
  <style>
    :root {
      --bg: #f7f5f1;
      --panel: #fffdf8;
      --ink: #222;
      --muted: #6d6860;
      --line: #d8d0c4;
      --soft: #eee8dd;
      --accent: #0f766e;
      --accent-soft: #dcefeb;
      --danger: #b42318;
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
      overflow: hidden;
    }

    button, input, textarea {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 8px 12px;
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover { border-color: #9c9488; }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .danger { color: var(--danger); border-color: #e0b3ad; background: #fff9f8; }

    .app {
      height: 100%;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      min-width: 1080px;
    }

    header {
      height: 64px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 16px;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
    }

    .sub {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .inputs {
      border-bottom: 1px solid var(--line);
      background: var(--soft);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
    }

    .inputs.collapsed { display: none; }

    .inputPanel {
      background: var(--panel);
      padding: 10px 12px;
      display: grid;
      grid-template-rows: auto 112px auto;
      gap: 8px;
      min-width: 0;
    }

    .labelRow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 13px;
    }

    .labelRow span {
      color: var(--muted);
      white-space: nowrap;
    }

    textarea {
      width: 100%;
      resize: none;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      padding: 8px 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.45;
      overflow: auto;
    }

    .loadRow {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .fileLabel {
      border: 1px dashed #b8afa2;
      border-radius: 6px;
      background: #fff;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 13px;
    }

    .fileLabel input { display: none; }

    .pairBar {
      border-bottom: 1px solid var(--line);
      background: #fdfbf6;
      padding: 10px 12px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) 260px 220px;
      gap: 10px;
      align-items: stretch;
      min-height: 102px;
    }

    .selectedBox {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      display: grid;
      grid-template-columns: 70px minmax(0, 1fr);
      gap: 10px;
      padding: 8px;
      align-items: center;
    }

    .selectedThumb {
      width: 70px;
      height: 70px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background:
        linear-gradient(45deg, #ececec 25%, transparent 25%),
        linear-gradient(-45deg, #ececec 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #ececec 75%),
        linear-gradient(-45deg, transparent 75%, #ececec 75%);
      background-size: 16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .selectedThumb img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }

    .selectedText {
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .selectedText strong {
      font-size: 13px;
    }

    .selectedText span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      word-break: break-all;
    }

    .actionBox {
      display: grid;
      gap: 8px;
    }

    .progressBox {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 8px;
      display: grid;
      gap: 7px;
      align-content: center;
    }

    .progressBox label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .progressBox input {
      width: 70px;
      border: 1px solid var(--line);
      border-radius: 5px;
      padding: 5px 7px;
      text-align: center;
    }

    .track {
      height: 9px;
      border-radius: 999px;
      background: #e8e1d6;
      overflow: hidden;
    }

    .bar {
      width: 0%;
      height: 100%;
      background: var(--accent);
    }

    .progressText {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .workbench {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 1px;
      background: var(--line);
      overflow: hidden;
    }

    .panel {
      min-width: 0;
      min-height: 0;
      background: var(--panel);
      display: grid;
      grid-template-rows: auto auto 1fr;
      overflow: hidden;
    }

    .panelHead {
      height: 46px;
      border-bottom: 1px solid var(--line);
      padding: 0 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .panelHead h2 {
      margin: 0;
      font-size: 14px;
    }

    .count {
      color: var(--muted);
      font-size: 13px;
    }

    .filters {
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
      display: grid;
      gap: 8px;
    }

    .filters input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      background: #fff;
    }

    .seg {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    .seg button {
      padding: 5px 9px;
      font-size: 12px;
    }

    .seg button.active {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: #075f58;
    }

    .gallery {
      min-height: 0;
      overflow: auto;
      padding: 12px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
      align-content: start;
    }

    .imageCard {
      min-width: 0;
      height: 360px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      display: grid;
      grid-template-rows: 250px 1fr;
      overflow: hidden;
      cursor: pointer;
    }

    .imageCard:hover {
      border-color: #9c9488;
    }

    .imageCard.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-soft) inset;
    }

    .imageCard.mapped {
      background: #fbfffd;
      border-color: #84b7ad;
    }

    .preview {
      width: 100%;
      height: 250px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(45deg, #ececec 25%, transparent 25%),
        linear-gradient(-45deg, #ececec 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #ececec 75%),
        linear-gradient(-45deg, transparent 75%, #ececec 75%);
      background-size: 18px 18px;
      background-position: 0 0, 0 9px, 9px -9px, -9px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .preview img {
      display: block;
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
    }

    .cardMeta {
      min-width: 0;
      padding: 8px;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 4px;
    }

    .cardTop {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 12px;
      font-weight: 700;
    }

    .cardPath {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      align-content: start;
      overflow: hidden;
    }

    .tag {
      max-width: 100%;
      border: 1px solid #e1d9cc;
      border-radius: 999px;
      background: #f8f5ef;
      padding: 2px 6px;
      color: #5f5a53;
      font-size: 10px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .viewer {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      grid-template-rows: auto 1fr;
      background: rgba(30, 29, 27, .84);
    }

    .viewer.open { display: grid; }

    .viewerBar {
      height: 48px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0 12px;
    }

    .viewerTitle {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      font-size: 13px;
    }

    .viewerActions {
      display: flex;
      gap: 8px;
      flex: none;
    }

    .viewerStage {
      overflow: auto;
      padding: 24px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .viewerStage img {
      display: block;
      background:
        linear-gradient(45deg, #ececec 25%, transparent 25%),
        linear-gradient(-45deg, #ececec 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #ececec 75%),
        linear-gradient(-45deg, transparent 75%, #ececec 75%);
      background-size: 18px 18px;
      background-position: 0 0, 0 9px, 9px -9px, -9px 0;
      box-shadow: 0 10px 36px rgba(0,0,0,.35);
      transform-origin: top center;
    }

    .viewerStage img.fit {
      max-width: 96%;
      max-height: calc(100vh - 100px);
      width: auto;
      height: auto;
    }

    .viewerStage img.actual {
      max-width: none;
      max-height: none;
    }

    .resultPanel {
      border-top: 1px solid var(--line);
      background: var(--panel);
      display: none;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 10px 12px;
      align-items: stretch;
      min-height: 150px;
      max-height: 260px;
    }

    .resultPanel.open {
      display: grid;
    }

    .resultMain {
      min-width: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 6px;
    }

    .resultHead {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }

    .resultHead span {
      color: var(--muted);
    }

    .resultPanel textarea {
      width: 100%;
      min-height: 92px;
      resize: none;
    }

    .resultActions {
      display: grid;
      gap: 8px;
      align-content: start;
      min-width: 128px;
    }

    .toast {
      position: fixed;
      right: 16px;
      bottom: 16px;
      max-width: 360px;
      background: #222;
      color: #fff;
      border-radius: 7px;
      padding: 10px 12px;
      font-size: 13px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .16s, transform .16s;
      pointer-events: none;
      z-index: 70;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>图片链接位点替换工具</h1>
        <div class="sub">v0.5 · 两栏稳定版：卡片完整预览，双击查看 100% 原图，只替换 URL</div>
      </div>
      <div class="toolbar">
        <button id="clearPairsBtn">清空配对</button>
        <button id="applyBtn" class="primary">应用替换</button>
        <button id="downloadBtn" disabled>下载 HTML</button>
      </div>
    </header>

    <section class="inputs" id="inputs">
      <div class="inputPanel">
        <div class="labelRow">
          <strong>原 HTML</strong>
          <span id="oldSummary">未解析</span>
        </div>
        <textarea id="oldHtmlInput" spellcheck="false" placeholder="粘贴原 HTML，或上传 .html 文件"></textarea>
        <div class="loadRow">
          <label class="fileLabel">上传 HTML<input id="oldFileInput" type="file" accept=".html,.htm,.txt"></label>
          <button id="parseOldBtn">解析原图位点</button>
        </div>
      </div>
      <div class="inputPanel">
        <div class="labelRow">
          <strong>新图片链接</strong>
          <span id="newSummary">未解析</span>
        </div>
        <textarea id="newLinksInput" spellcheck="false" placeholder="粘贴公众号图片链接，或粘贴包含 img 的整段代码"></textarea>
        <div class="loadRow">
          <label class="fileLabel">上传文本<input id="newFileInput" type="file" accept=".txt,.html,.htm"></label>
          <button id="parseNewBtn">解析新图链接</button>
        </div>
      </div>
    </section>

    <section class="pairBar">
      <div class="selectedBox">
        <div class="selectedThumb" id="selectedOldThumb"></div>
        <div class="selectedText">
          <strong>已选原图位点</strong>
          <span id="selectedOldText">点击左侧图片</span>
        </div>
      </div>
      <div class="selectedBox">
        <div class="selectedThumb" id="selectedNewThumb"></div>
        <div class="selectedText">
          <strong>已选新图链接</strong>
          <span id="selectedNewText">点击右侧图片</span>
        </div>
      </div>
      <div class="actionBox">
        <button id="pairBtn" class="primary">建立配对</button>
        <button id="autoPairBtn">按当前顺序配对</button>
      </div>
      <div class="progressBox">
        <label><span>计划替换数</span><input id="targetCount" type="number" min="0" step="1" placeholder="自动"></label>
        <div class="track"><div class="bar" id="progressBar"></div></div>
        <div class="progressText" id="progressText">载入数据后显示进度</div>
      </div>
    </section>

    <main class="workbench">
      <section class="panel">
        <div class="panelHead">
          <h2>左侧：原 HTML 图片位点</h2>
          <span class="count" id="oldCount">0 个</span>
        </div>
        <div class="filters">
          <input id="oldSearch" placeholder="搜索 line、Part、图层、page、尺寸">
          <div class="seg" id="oldMode">
            <button data-mode="all" class="active">全部</button>
            <button data-mode="unmapped">未配对</button>
            <button data-mode="mapped">已配对</button>
          </div>
        </div>
        <div class="gallery" id="oldGrid"></div>
      </section>

      <section class="panel">
        <div class="panelHead">
          <h2>右侧：新图片链接</h2>
          <span class="count" id="newCount">0 个</span>
        </div>
        <div class="filters">
          <input id="newSearch" placeholder="搜索序号、尺寸、链接片段">
          <div class="seg" id="newMode">
            <button data-mode="all" class="active">全部</button>
            <button data-mode="unused">未使用</button>
            <button data-mode="used">已使用</button>
          </div>
        </div>
        <div class="gallery" id="newGrid"></div>
      </section>
    </main>

    <section class="resultPanel" id="resultPanel">
      <div class="resultMain">
        <div class="resultHead">
          <strong>替换后 HTML</strong>
          <span id="replaceSummary">尚未生成</span>
        </div>
        <textarea id="outputHtml" readonly spellcheck="false"></textarea>
      </div>
      <div class="resultActions">
        <button id="copyBtn" class="primary" disabled>复制最新代码</button>
        <button id="hideResultBtn">收起结果</button>
      </div>
    </section>
  </div>

  <div class="viewer" id="viewer" aria-hidden="true">
    <div class="viewerBar">
      <div class="viewerTitle" id="viewerTitle"></div>
      <div class="viewerActions">
        <button id="viewerFitBtn">适屏</button>
        <button id="viewerActualBtn">100% 原图</button>
        <button id="viewerZoomInBtn">放大</button>
        <button id="viewerZoomOutBtn">缩小</button>
        <button id="viewerCloseBtn" class="primary">关闭</button>
      </div>
    </div>
    <div class="viewerStage">
      <img id="viewerImg" alt="">
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const state = {
      html: "",
      oldItems: [],
      newItems: [],
      pairs: new Map(),
      selectedOld: null,
      selectedNew: null,
      oldMode: "all",
      newMode: "all",
      output: ""
    };

    let viewerZoom = 1;
    let viewerSize = null;

    const els = {
      inputs: document.getElementById("inputs"),
      oldHtmlInput: document.getElementById("oldHtmlInput"),
      newLinksInput: document.getElementById("newLinksInput"),
      oldGrid: document.getElementById("oldGrid"),
      newGrid: document.getElementById("newGrid"),
      oldCount: document.getElementById("oldCount"),
      newCount: document.getElementById("newCount"),
      oldSummary: document.getElementById("oldSummary"),
      newSummary: document.getElementById("newSummary"),
      selectedOldThumb: document.getElementById("selectedOldThumb"),
      selectedNewThumb: document.getElementById("selectedNewThumb"),
      selectedOldText: document.getElementById("selectedOldText"),
      selectedNewText: document.getElementById("selectedNewText"),
      targetCount: document.getElementById("targetCount"),
      progressBar: document.getElementById("progressBar"),
      progressText: document.getElementById("progressText"),
      oldSearch: document.getElementById("oldSearch"),
      newSearch: document.getElementById("newSearch"),
      downloadBtn: document.getElementById("downloadBtn"),
      resultPanel: document.getElementById("resultPanel"),
      outputHtml: document.getElementById("outputHtml"),
      replaceSummary: document.getElementById("replaceSummary"),
      copyBtn: document.getElementById("copyBtn"),
      viewer: document.getElementById("viewer"),
      viewerImg: document.getElementById("viewerImg"),
      viewerTitle: document.getElementById("viewerTitle"),
      toast: document.getElementById("toast")
    };

    function toast(message) {
      els.toast.textContent = message;
      els.toast.classList.add("show");
      clearTimeout(toast.timer);
      toast.timer = setTimeout(() => els.toast.classList.remove("show"), 2200);
    }

    function decodeEntities(value) {
      return value.replace(/&amp;/g, "&").replace(/&quot;/g, '"').replace(/&#39;/g, "'");
    }

    function encodeForOriginalStyle(newUrl, oldRaw) {
      return oldRaw.includes("&amp;") ? newUrl.replace(/&/g, "&amp;") : newUrl;
    }

    function lineNumberAt(text, index) {
      let line = 1;
      for (let i = 0; i < index; i += 1) {
        if (text.charCodeAt(i) === 10) line += 1;
      }
      return line;
    }

    function nearestSectionPath(text, index) {
      const start = Math.max(0, index - 7000);
      const slice = text.slice(start, index);
      const names = [];
      const pattern = /<(section|g)\b[^>]*(?:name|label)=["']([^"']+)["'][^>]*>/g;
      let match;
      while ((match = pattern.exec(slice))) {
        const name = match[2].trim();
        if (!name || /ZER0N|插图/.test(name)) continue;
        if (names[names.length - 1] !== name) names.push(name);
      }
      return names.slice(-4).join(" / ");
    }

    function extractSize(tag) {
      const width = tag.match(/\b(?:width|data-w)=["']?([0-9.]+)/i);
      const height = tag.match(/\b(?:height|data-h)=["']?([0-9.]+)/i);
      if (width && height) {
        return { width: Math.round(Number(width[1])), height: Math.round(Number(height[1])) };
      }
      const ratio = tag.match(/\bdata-ratio=["']?([0-9.]+)/i);
      const dataW = tag.match(/\bdata-w=["']?([0-9.]+)/i);
      if (ratio && dataW) {
        const w = Math.round(Number(dataW[1]));
        return { width: w, height: Math.round(w * Number(ratio[1])) };
      }
      return { width: 0, height: 0 };
    }

    function sizeText(size) {
      return size?.width && size?.height ? `${size.width}x${size.height}` : "";
    }

    function shortUrl(url) {
      const clean = String(url).split("?")[0];
      const parts = clean.split("/");
      return parts.slice(-2).join("/");
    }

    function parseOldHtml(html) {
      const items = [];
      const tagPattern = /<(image|img)\b[^>]*>/gi;
      let tagMatch;
      while ((tagMatch = tagPattern.exec(html))) {
        const tag = tagMatch[0];
        const tagStart = tagMatch.index;
        const attrMatches = [...tag.matchAll(/\b(href|src|data-src)=["']([^"']+)["']/gi)];
        const attrs = attrMatches.filter(m => /qpic\.cn|mmbiz|mmecoa/.test(m[2]));
        if (!attrs.length) continue;

        const primary = attrs.find(m => m[1].toLowerCase() === "href")
          || attrs.find(m => m[1].toLowerCase() === "data-src")
          || attrs[0];
        const rawUrl = primary[2];
        const url = decodeEntities(rawUrl);
        const valueStart = tagStart + primary.index + primary[0].indexOf(primary[2]);
        const ranges = attrs
          .filter(m => decodeEntities(m[2]) === url)
          .map(m => {
            const start = tagStart + m.index + m[0].indexOf(m[2]);
            return { rawUrl: m[2], start, end: start + m[2].length };
          });
        const size = extractSize(tag);
        items.push({
          id: `old-${items.length + 1}`,
          index: items.length + 1,
          tagName: tagMatch[1].toLowerCase(),
          attr: primary[1].toLowerCase(),
          url,
          rawUrl,
          ranges,
          start: valueStart,
          end: valueStart + rawUrl.length,
          line: lineNumberAt(html, valueStart),
          path: nearestSectionPath(html, tagStart),
          size,
          dimension: sizeText(size)
        });
      }
      return items;
    }

    function parseNewLinks(text) {
      const urls = [];
      const sizes = new Map();
      const tagPattern = /<img\b[^>]*>/gi;
      let tagMatch;
      while ((tagMatch = tagPattern.exec(text))) {
        const tag = tagMatch[0];
        const src = tag.match(/\bsrc=["']([^"']+)["']/i);
        if (!src) continue;
        const url = decodeEntities(src[1]).replace(/,$/, "");
        if (!/qpic\.cn|mmbiz|mmecoa/.test(url)) continue;
        if (!urls.includes(url)) urls.push(url);
        sizes.set(url, extractSize(tag));
      }

      const urlPattern = /https?:\/\/[^"'<>\s)]+/g;
      let match;
      while ((match = urlPattern.exec(text))) {
        const url = decodeEntities(match[0]).replace(/,$/, "");
        if (!/qpic\.cn|mmbiz|mmecoa/.test(url)) continue;
        if (!urls.includes(url)) urls.push(url);
      }

      return urls.map((url, idx) => {
        const size = sizes.get(url) || { width: 0, height: 0 };
        return { id: `new-${idx + 1}`, index: idx + 1, url, size, dimension: sizeText(size) };
      });
    }

    function makeImg(url) {
      const img = document.createElement("img");
      img.loading = "lazy";
      img.referrerPolicy = "no-referrer";
      img.src = url;
      img.addEventListener("error", () => {
        img.replaceWith(document.createTextNode("加载失败"));
      });
      return img;
    }

    function render() {
      renderOldGrid();
      renderNewGrid();
      renderSelection();
      renderStats();
    }

    function oldMatches(item) {
      if (state.oldMode === "mapped" && !state.pairs.has(item.id)) return false;
      if (state.oldMode === "unmapped" && state.pairs.has(item.id)) return false;
      const q = els.oldSearch.value.trim().toLowerCase();
      if (!q) return true;
      return [item.index, item.line, item.path, item.dimension, item.attr, item.url].join(" ").toLowerCase().includes(q);
    }

    function newMatches(item) {
      const used = [...state.pairs.values()].includes(item.id);
      if (state.newMode === "used" && !used) return false;
      if (state.newMode === "unused" && used) return false;
      const q = els.newSearch.value.trim().toLowerCase();
      if (!q) return true;
      return [item.index, item.dimension, item.url].join(" ").toLowerCase().includes(q);
    }

    function renderOldGrid() {
      els.oldGrid.textContent = "";
      const fragment = document.createDocumentFragment();
      state.oldItems.filter(oldMatches).forEach(item => {
        const card = document.createElement("article");
        card.className = "imageCard";
        if (state.selectedOld === item.id) card.classList.add("selected");
        if (state.pairs.has(item.id)) card.classList.add("mapped");
        card.title = item.url;
        card.addEventListener("click", () => {
          state.selectedOld = item.id;
          renderSelection();
          renderOldGrid();
        });
        card.addEventListener("dblclick", () => openViewer(item.url, `原图位点 #${item.index} · line ${item.line} · ${item.dimension}`, item.size));
        card.innerHTML = `
          <div class="preview"></div>
          <div class="cardMeta">
            <div class="cardTop"><span>#${item.index}</span><span>line ${item.line}</span></div>
            <div class="cardPath">${escapeHtml(item.path || "未命名结构")}</div>
            <div class="tags">
              <span class="tag">${item.tagName}</span>
              <span class="tag">${item.attr}</span>
              ${item.dimension ? `<span class="tag">${item.dimension}</span>` : ""}
            </div>
          </div>
        `;
        card.querySelector(".preview").appendChild(makeImg(item.url));
        fragment.appendChild(card);
      });
      els.oldGrid.appendChild(fragment);
      els.oldCount.textContent = `${state.oldItems.length} 个`;
    }

    function renderNewGrid() {
      els.newGrid.textContent = "";
      const fragment = document.createDocumentFragment();
      state.newItems.filter(newMatches).forEach(item => {
        const used = [...state.pairs.values()].includes(item.id);
        const card = document.createElement("article");
        card.className = "imageCard";
        if (state.selectedNew === item.id) card.classList.add("selected");
        if (used) card.classList.add("mapped");
        card.title = item.url;
        card.addEventListener("click", () => {
          state.selectedNew = item.id;
          renderSelection();
          renderNewGrid();
        });
        card.addEventListener("dblclick", () => openViewer(item.url, `新图链接 #${item.index} · ${item.dimension}`, item.size));
        card.innerHTML = `
          <div class="preview"></div>
          <div class="cardMeta">
            <div class="cardTop"><span>#${item.index}</span><span>${used ? "已使用" : "未使用"}</span></div>
            <div class="cardPath">${escapeHtml(shortUrl(item.url))}</div>
            <div class="tags">
              <span class="tag">qpic</span>
              ${item.dimension ? `<span class="tag">${item.dimension}</span>` : ""}
            </div>
          </div>
        `;
        card.querySelector(".preview").appendChild(makeImg(item.url));
        fragment.appendChild(card);
      });
      els.newGrid.appendChild(fragment);
      els.newCount.textContent = `${state.newItems.length} 个`;
    }

    function renderSelection() {
      const old = state.oldItems.find(x => x.id === state.selectedOld);
      const newer = state.newItems.find(x => x.id === state.selectedNew);
      els.selectedOldThumb.textContent = "";
      els.selectedNewThumb.textContent = "";

      if (old) {
        els.selectedOldThumb.appendChild(makeImg(old.url));
        els.selectedOldText.textContent = `#${old.index} · line ${old.line} · ${old.dimension || ""} · ${old.path || "未命名结构"}`;
      } else {
        els.selectedOldText.textContent = "点击左侧图片";
      }

      if (newer) {
        els.selectedNewThumb.appendChild(makeImg(newer.url));
        els.selectedNewText.textContent = `#${newer.index} · ${newer.dimension || ""} · ${shortUrl(newer.url)}`;
      } else {
        els.selectedNewText.textContent = "点击右侧图片";
      }
    }

    function renderStats() {
      els.oldSummary.textContent = state.oldItems.length ? `已解析 ${state.oldItems.length} 个位点` : "未解析";
      els.newSummary.textContent = state.newItems.length ? `已解析 ${state.newItems.length} 个链接` : "未解析";
      const target = Number(els.targetCount.value) || state.newItems.length || 0;
      const paired = state.pairs.size;
      const percent = target ? Math.min(100, Math.round((paired / target) * 100)) : 0;
      els.progressBar.style.width = `${percent}%`;
      if (!target) {
        els.progressText.textContent = "载入数据后显示进度";
      } else if (paired < target) {
        els.progressText.textContent = `计划 ${target} 张，已配对 ${paired} 张，还差 ${target - paired} 张`;
      } else if (paired === target) {
        els.progressText.textContent = `计划 ${target} 张，已全部配对`;
      } else {
        els.progressText.textContent = `计划 ${target} 张，已配对 ${paired} 张，超出 ${paired - target} 张`;
      }
    }

    function pairSelected() {
      if (!state.selectedOld || !state.selectedNew) {
        toast("先选择左侧原图和右侧新图");
        return;
      }
      state.pairs.set(state.selectedOld, state.selectedNew);
      const oldIndex = state.oldItems.findIndex(x => x.id === state.selectedOld);
      const newIndex = state.newItems.findIndex(x => x.id === state.selectedNew);
      const used = new Set(state.pairs.values());
      const nextOld = state.oldItems.slice(oldIndex + 1).find(x => !state.pairs.has(x.id));
      const nextNew = state.newItems.slice(newIndex + 1).find(x => !used.has(x.id));
      if (nextOld) state.selectedOld = nextOld.id;
      if (nextNew) state.selectedNew = nextNew.id;
      render();
    }

    function autoPairVisibleOrder() {
      const olds = state.oldItems.filter(oldMatches).filter(x => !state.pairs.has(x.id));
      const used = new Set(state.pairs.values());
      const news = state.newItems.filter(newMatches).filter(x => !used.has(x.id));
      const count = Math.min(olds.length, news.length);
      for (let i = 0; i < count; i += 1) state.pairs.set(olds[i].id, news[i].id);
      toast(`新增 ${count} 组配对`);
      render();
    }

    function applyReplacement() {
      if (!state.html) {
        toast("还没有原 HTML");
        return;
      }
      const target = Number(els.targetCount.value) || state.newItems.length || 0;
      if (target && state.pairs.size !== target) {
        const diff = target - state.pairs.size;
        toast(diff > 0 ? `将只替换已配对的 ${state.pairs.size} 张，还剩 ${diff} 张未配` : `已配对 ${state.pairs.size} 张，超出计划 ${Math.abs(diff)} 张`);
      }
      const replacements = [];
      for (const [oldId, newId] of state.pairs.entries()) {
        const old = state.oldItems.find(x => x.id === oldId);
        const newer = state.newItems.find(x => x.id === newId);
        if (!old || !newer) continue;
        const ranges = old.ranges.length ? old.ranges : [{ start: old.start, end: old.end, rawUrl: old.rawUrl }];
        ranges.forEach(range => {
          replacements.push({
            start: range.start,
            end: range.end,
            value: encodeForOriginalStyle(newer.url, range.rawUrl)
          });
        });
      }
      replacements.sort((a, b) => b.start - a.start);
      let output = state.html;
      replacements.forEach(r => {
        output = output.slice(0, r.start) + r.value + output.slice(r.end);
      });
      state.output = output;
      els.outputHtml.value = output;
      els.replaceSummary.textContent = `已替换 ${replacements.length} 处 URL，来自 ${state.pairs.size} 组配对`;
      els.resultPanel.classList.add("open");
      els.copyBtn.disabled = false;
      els.downloadBtn.disabled = false;
      toast(`已生成结果：替换 ${replacements.length} 处 URL`);
    }

    function downloadOutput() {
      const blob = new Blob([state.output], { type: "text/html;charset=utf-8" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "replaced.html";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(a.href);
    }

    function openViewer(url, title, size = null) {
      viewerZoom = 1;
      viewerSize = size;
      els.viewerTitle.textContent = title || url;
      els.viewerImg.src = url;
      els.viewerImg.className = "fit";
      els.viewerImg.style.width = "";
      els.viewerImg.style.height = "";
      els.viewerImg.style.minWidth = "";
      els.viewerImg.style.minHeight = "";
      els.viewerImg.style.transform = "";
      els.viewer.classList.add("open");
      els.viewer.setAttribute("aria-hidden", "false");
    }

    function closeViewer() {
      els.viewer.classList.remove("open");
      els.viewer.setAttribute("aria-hidden", "true");
      els.viewerImg.removeAttribute("src");
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, ch => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[ch]));
    }

    async function readFileToTextarea(input, textarea) {
      const file = input.files?.[0];
      if (!file) return;
      textarea.value = await file.text();
    }

    function parseOld() {
      state.html = els.oldHtmlInput.value;
      state.oldItems = parseOldHtml(state.html);
      state.pairs.clear();
      state.selectedOld = state.oldItems[0]?.id || null;
      state.output = "";
      els.outputHtml.value = "";
      els.replaceSummary.textContent = "尚未生成";
      els.resultPanel.classList.remove("open");
      els.copyBtn.disabled = true;
      els.downloadBtn.disabled = true;
      render();
      toast(`已解析 ${state.oldItems.length} 个原图位点`);
    }

    function parseNew() {
      state.newItems = parseNewLinks(els.newLinksInput.value);
      state.pairs.clear();
      state.selectedNew = state.newItems[0]?.id || null;
      if (!els.targetCount.value && state.newItems.length) els.targetCount.value = state.newItems.length;
      state.output = "";
      els.outputHtml.value = "";
      els.replaceSummary.textContent = "尚未生成";
      els.resultPanel.classList.remove("open");
      els.copyBtn.disabled = true;
      els.downloadBtn.disabled = true;
      render();
      toast(`已解析 ${state.newItems.length} 个新图链接`);
    }

    document.getElementById("parseOldBtn").addEventListener("click", parseOld);
    document.getElementById("parseNewBtn").addEventListener("click", parseNew);
    document.getElementById("pairBtn").addEventListener("click", pairSelected);
    document.getElementById("autoPairBtn").addEventListener("click", autoPairVisibleOrder);
    document.getElementById("clearPairsBtn").addEventListener("click", () => {
      state.pairs.clear();
      render();
    });
    document.getElementById("applyBtn").addEventListener("click", applyReplacement);
    document.getElementById("downloadBtn").addEventListener("click", downloadOutput);
    document.getElementById("copyBtn").addEventListener("click", async () => {
      if (!state.output) {
        toast("还没有生成结果");
        return;
      }
      await navigator.clipboard.writeText(state.output);
      toast("已复制最新 HTML 代码");
    });
    document.getElementById("hideResultBtn").addEventListener("click", () => {
      els.resultPanel.classList.remove("open");
    });
    document.getElementById("oldFileInput").addEventListener("change", async e => {
      await readFileToTextarea(e.target, els.oldHtmlInput);
      parseOld();
    });
    document.getElementById("newFileInput").addEventListener("change", async e => {
      await readFileToTextarea(e.target, els.newLinksInput);
      parseNew();
    });

    els.oldSearch.addEventListener("input", renderOldGrid);
    els.newSearch.addEventListener("input", renderNewGrid);
    els.targetCount.addEventListener("input", renderStats);

    document.getElementById("oldMode").addEventListener("click", e => {
      if (!e.target.matches("button")) return;
      state.oldMode = e.target.dataset.mode;
      [...e.currentTarget.children].forEach(btn => btn.classList.toggle("active", btn === e.target));
      renderOldGrid();
    });

    document.getElementById("newMode").addEventListener("click", e => {
      if (!e.target.matches("button")) return;
      state.newMode = e.target.dataset.mode;
      [...e.currentTarget.children].forEach(btn => btn.classList.toggle("active", btn === e.target));
      renderNewGrid();
    });

    document.getElementById("viewerCloseBtn").addEventListener("click", closeViewer);
    document.getElementById("viewerFitBtn").addEventListener("click", () => {
      viewerZoom = 1;
      els.viewerImg.className = "fit";
      els.viewerImg.style.width = "";
      els.viewerImg.style.height = "";
      els.viewerImg.style.minWidth = "";
      els.viewerImg.style.minHeight = "";
      els.viewerImg.style.transform = "";
    });
    document.getElementById("viewerActualBtn").addEventListener("click", () => {
      viewerZoom = 1;
      els.viewerImg.className = "actual";
      if (viewerSize?.width) {
        els.viewerImg.style.width = `${viewerSize.width}px`;
        els.viewerImg.style.minWidth = `${viewerSize.width}px`;
      }
      if (viewerSize?.height) {
        els.viewerImg.style.height = `${viewerSize.height}px`;
        els.viewerImg.style.minHeight = `${viewerSize.height}px`;
      }
      els.viewerImg.style.transform = "";
    });
    document.getElementById("viewerZoomInBtn").addEventListener("click", () => {
      els.viewerImg.className = "actual";
      viewerZoom = Math.min(4, viewerZoom + .25);
      els.viewerImg.style.transform = `scale(${viewerZoom})`;
    });
    document.getElementById("viewerZoomOutBtn").addEventListener("click", () => {
      els.viewerImg.className = "actual";
      viewerZoom = Math.max(.25, viewerZoom - .25);
      els.viewerImg.style.transform = `scale(${viewerZoom})`;
    });
    document.addEventListener("keydown", e => {
      if (e.key === "Escape" && els.viewer.classList.contains("open")) closeViewer();
    });

    render();
  </script>
</body>
</html>
